name: SQL Validation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install tsx
        run: pnpm add -g tsx

      - name: Get build info
        id: build_info
        run: |
          TSX_OUTPUT=$(tsx src/index.ts check-update 2>&1 || true)
          BUILD_NUMBER=$(echo "$TSX_OUTPUT" | grep "Latest build number:" | awk '{print $4}')
          if [ -z "$BUILD_NUMBER" ]; then
            echo "ERROR: Could not retrieve build number"
            exit 1
          fi
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

      - name: Cache SDE unzipped data
        id: cache_sde
        uses: actions/cache@v4
        with:
          path: refs/unzipped
          key: sde-unzipped-${{ steps.build_info.outputs.build_number }}

      - name: Cache converted output
        id: cache_output
        uses: actions/cache@v4
        with:
          path: output
          key: sde-output-${{ steps.build_info.outputs.build_number }}-${{ steps.build_info.outputs.commit_sha }}

      - name: Convert (using cached SDE data)
        if: steps.cache_output.outputs.cache-hit != 'true' && steps.cache_sde.outputs.cache-hit == 'true'
        run: tsx src/index.ts convert --unzipped-dir refs/unzipped

      - name: Convert (download + convert)
        if: steps.cache_output.outputs.cache-hit != 'true' && steps.cache_sde.outputs.cache-hit != 'true'
        run: tsx src/index.ts convert

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3
          
      # ── Oracle ───────────────────────────────────────────────────────────────
      - name: Test Oracle
        run: |
          docker run -d --name oracle-test \
            -e ORACLE_PASSWORD=Oracle_123 \
            -e APP_USER=sde \
            -e APP_USER_PASSWORD=Oracle_123 \
            gvenzl/oracle-free:slim

          echo "Waiting for Oracle (this may take several minutes)..."
          timeout 300 bash -c \
            'until docker logs oracle-test 2>&1 | grep -q "DATABASE IS READY TO USE"; \
            do sleep 5; done' || {
              echo "Oracle validation failed. Last 100 lines of logs:"
              docker logs -n 100 oracle-test
              exit 1
            }

          docker cp output/sde-oracle.sql oracle-test:/tmp/sde-oracle.sql
          docker exec oracle-test bash -c \
            '{ echo "WHENEVER OSERROR EXIT 1;"; echo "WHENEVER SQLERROR EXIT SQL.SQLCODE;"; echo "SET DEFINE OFF;"; cat /tmp/sde-oracle.sql; echo "EXIT;"; } | sqlplus -s sde/Oracle_123@//localhost:1521/FREEPDB1'
          echo "Oracle: OK"
          docker rm -f oracle-test

      # ── MySQL ────────────────────────────────────────────────────────────────
      - name: Test MySQL
        run: |
          docker run -d --name mysql-test \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=sde \
            mysql:8

          echo "Waiting for MySQL..."
          timeout 120 bash -c \
            'until docker exec mysql-test mysql -u root -proot -e "SELECT 1" 2>/dev/null; do sleep 2; done'

          docker cp output/sde.sql mysql-test:/tmp/sde.sql
          docker exec mysql-test bash -c "mysql -u root -proot sde < /tmp/sde.sql"
          echo "MySQL: OK"
          docker rm -f mysql-test

      # ── PostgreSQL ───────────────────────────────────────────────────────────
      - name: Test PostgreSQL
        run: |
          docker run -d --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=sde \
            postgres:16

          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c \
            'until docker exec postgres-test pg_isready -U postgres 2>/dev/null; do sleep 2; done'

          docker cp output/sde-postgres.sql postgres-test:/tmp/sde-postgres.sql
          docker exec postgres-test bash -c "psql -v ON_ERROR_STOP=1 -U postgres -d sde -f /tmp/sde-postgres.sql"
          echo "PostgreSQL: OK"
          docker rm -f postgres-test

      # ── SQLite ───────────────────────────────────────────────────────────────
      - name: Test SQLite
        run: |
          TABLE_COUNT=$(sqlite3 output/sde.sqlite ".tables" | wc -w)
          if [ "$TABLE_COUNT" -eq 0 ]; then
            echo "ERROR: No tables found in SQLite database"
            exit 1
          fi
          echo "SQLite: OK ($TABLE_COUNT tables)"

      # ── SQL Server (MSSQL) ───────────────────────────────────────────────────
      - name: Test SQL Server
        run: |
          docker run -d --name mssql-test \
            --memory=5g --memory-swap=5g \
            -e ACCEPT_EULA=Y \
            -e MSSQL_SA_PASSWORD='YourStrong!Passw0rd' \
            -e MSSQL_MEMORY_LIMIT_MB=3072 \
            mcr.microsoft.com/mssql/server:2022-latest

          echo "Waiting for SQL Server..."
          timeout 120 bash -c \
            'until docker logs mssql-test 2>&1 | grep -q "SQL Server is now ready"; do sleep 3; done'

          # The "SQL Server is now ready" log message can still precede full
          # TCP stability on slower CI runners. Retry sqlcmd until it succeeds
          # to ensure the server is truly accepting connections before proceeding.
          echo "Verifying SQL Server connectivity..."
          for i in $(seq 1 30); do
            if docker exec mssql-test /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U SA -P 'YourStrong!Passw0rd' -C \
              -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is accepting connections"
              break
            fi
            echo "Attempt $i: not ready yet, retrying in 2s..."
            sleep 2
          done
          docker logs -n 100 mssql-test

          docker exec mssql-test /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P 'YourStrong!Passw0rd' -C -b -V 16 \
            -Q "CREATE DATABASE sde COLLATE Latin1_General_100_CI_AS_SC"
          echo "Created database 'sde' in SQL Server"

          docker cp output/sde-mssql.sql mssql-test:/tmp/sde-mssql.sql

          echo "Running SQL Server validation script..."

          docker exec mssql-test /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P 'YourStrong!Passw0rd' -C -b -V 16 \
            -d sde -i /tmp/sde-mssql.sql || {
              echo "SQL Server validation failed. Last 100 lines of logs:"
              docker logs -n 100 mssql-test
              exit 1
            }
          echo "SQL Server: OK"
          docker rm -f mssql-test
